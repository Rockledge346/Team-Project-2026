<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">The Letterkenny Hotel</a>
    <a class="btn btn-outline-light btn-sm" href="/admin/bookings">Back to Bookings</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="mb-3">Manage Booking #{{ booking.id }}</h2>
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Booking Status -->
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select class="form-select" name="status">
                <option value="confirmed" {% if booking.status=='confirmed' %}selected{% endif %}>Confirmed</option>
                <option value="cancelled" {% if booking.status=='cancelled' %}selected{% endif %}>Cancelled</option>
              </select>
            </div>

           
            <div class="mb-3">
              <label class="form-label">Payment</label>
              <select class="form-select" name="payment_status">
                <option value="pending" {% if booking.payment_status=='pending' %}selected{% endif %}>Pending</option>
                <option value="paid" {% if booking.payment_status=='paid' %}selected{% endif %}>Paid</option>
              </select>
            </div>

          
            <div class="mb-3">
              <label class="form-label">Number of Rooms</label>
              <input class="form-control" type="number" name="num_rooms" value="{{ booking.num_rooms }}">
            </div>

        
            <div class="mb-3">
              <label class="form-label">Adults</label>
              <input class="form-control" type="number" name="num_adults" value="{{ booking.num_adults }}">
            </div>

            <div class="mb-3">
              <label class="form-label">Children</label>
              <input class="form-control" type="number" name="num_children" value="{{ booking.num_children }}">
            </div>


       
         

        <div class="mb-3">
  <label class="form-label">Add-ons</label>

  <div class="border rounded p-3">
    {% set sr = booking.special_requests or "" %}

    {% for key, addon in addons.items() %}
      <div class="form-check">
        <input 
          class="form-check-input"
          type="checkbox"
          name="addons"
          value="{{ key }}"
          id="addon_{{ key }}"
          {% if addon.label in sr %}checked{% endif %}
        >
        <label class="form-check-label" for="addon_{{ key }}">
          {{ addon.label }} (€{{ addon.price }} per person / night)
        </label>
      </div>
    {% endfor %}
  </div>
</div>




          
            <div class="mb-3">
              <label class="form-label">Special Requests</label>
              <textarea class="form-control" name="special_requests" rows="2"style="resize: none;">{{ booking.special_requests }}</textarea>
            </div>

            <!-- check in chewck out admin -->
                <div class="mb-3">
          <button name="action" value="check_in">Check In</button>
          <button name="action" value="check_out">Check Out</button>

                </div>


         
            <div class="d-grid gap-2">
              <button type="submit" name="action" value="edit" class="btn btn-success btn-lg">Save Changes</button>
              <button type="submit" name="action" value="cancel" class="btn btn-danger btn-lg"
                      onclick="return confirm('Are you sure you want to cancel this booking?');">Cancel Booking</button>
              <a class="btn btn-dark btn-lg" href="/admin/bookings">Cancel</a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
