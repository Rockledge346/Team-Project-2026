<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">The Letterkenny Hotel</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="mb-2">Admin Dashboard</h2>
          <p class="text-muted mb-4">Quick access to bookings and management.</p>

          <div class="d-grid gap-3">
            <!-- View all bookings table -->
            <a class="btn btn-primary btn-lg" href="/admin/bookings">View Bookings</a>

          
            <!-- Create a new booking -->
            <a class="btn btn-primary btn-lg" href="/admin/create-booking">Create Booking</a>
            
            <!--View rooms and status-->
            <a class="btn btn-primary btn-lg" href="/admin/view_rooms">View Rooms</a>

            <!-- Edit rooms  -->
            <a class="btn btn-primary btn-lg" href="/admin/edit_rooms">Edit Rooms</a>

            <form action="{{ url_for('logout') }}" method="post">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button type="submit" class="btn btn-outline-dark btn-lg w-100">Logout</button>
            </form>

          </div>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
